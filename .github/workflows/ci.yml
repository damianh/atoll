name: ci

on:
  push:
    branches:
      - main
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Build NuGet packages
        run: |
          dotnet pack src/Atoll/Atoll.csproj --no-build -c Release --output ./packages
          dotnet pack src/Atoll.Annotations/Atoll.Annotations.csproj --no-build -c Release --output ./packages
          dotnet pack src/Atoll.Cli/Atoll.Cli.csproj --no-build -c Release --output ./packages
          dotnet pack src/Atoll.DrawIo/Atoll.DrawIo.csproj --no-build -c Release --output ./packages
          dotnet pack src/Atoll.Giscus/Atoll.Giscus.csproj --no-build -c Release --output ./packages
          dotnet pack src/Atoll.Lagoon/Atoll.Lagoon.csproj --no-build -c Release --output ./packages
          dotnet pack src/Atoll.Mermaid/Atoll.Mermaid.csproj --no-build -c Release --output ./packages
          dotnet pack src/Atoll.Middleware/Atoll.Middleware.csproj --no-build -c Release --output ./packages
          dotnet pack src/Atoll.Reef/Atoll.Reef.csproj --no-build -c Release --output ./packages

      - name: Pack Templates
        run: dotnet pack templates/Atoll.Templates.csproj -c Release --output ./packages

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ matrix.os }}
          path: ./packages/*.nupkg
