name: CI

on:
  push:
    branches: [main, astro-fork]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Pack Templates
        run: dotnet pack templates/Atoll.Templates.csproj -c Release

      - name: Upload Template Pack
        uses: actions/upload-artifact@v4
        with:
          name: atoll-templates-nupkg-${{ matrix.os }}
          path: templates/bin/Release/*.nupkg
